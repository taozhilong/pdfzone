<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Icon: PDF document with folded corner -->
  <rect x="10" y="20" width="70" height="90" rx="12" fill="url(#bg)"/>
  <rect x="10" y="20" width="70" height="25" rx="12" fill="#1e40af"/>
  <rect x="10" y="35" width="70" height="10" fill="#1e40af"/>
  
  <!-- Folded corner -->
  <path d="M55 20 L80 20 Q80 20 80 45 L80 45 L55 45 Z" fill="#3b82f6"/>
  <path d="M55 20 Q67 20 80 33 Q67 33 67 45 L55 45 Z" fill="#60a5fa"/>
  <path d="M55 20 L80 45 L55 45 Z" fill="#93c5fd"/>
  
  <!-- PDF letters -->
  <text x="45" y="82" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">PDF</text>
  
  <!-- Lines representing text -->
  <rect x="22" y="90" width="25" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  <rect x="22" y="97" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Spark/star accent -->
  <path d="M85 15 L88 22 L95 22 L90 27 L92 35 L85 30 L78 35 L80 27 L75 22 L82 22 Z" fill="url(#grad)" opacity="0.9"/>

  <!-- Text: Zone -->
  <text x="115" y="58" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#1e293b">Zone</text>
  <text x="115" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#64748b" letter-spacing="4">FREE ONLINE TOOLS</text>
</svg>
